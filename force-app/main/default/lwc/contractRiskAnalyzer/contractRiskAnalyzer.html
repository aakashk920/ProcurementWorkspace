<template>

    <lightning-card title="Contract Risk Analyzer">

        <!-- KPI SECTION -->

        <div class="kpiContainer">

            <div class="kpiBox">
                <h1>{totalDeals}</h1>
                <p>Total Deals</p>
            </div>

            <div class="kpiBox risk">
                <h1>{highRiskDeals}</h1>
                <p>High Risk</p>
            </div>

            <div class="kpiBox revenue">
                <h1>{totalRevenue}</h1>
                <p>Total Revenue</p>
            </div>

            <div class="kpiBox warning">
                <h1>{pendingFollowUps}</h1>
                <p>Pending Follow-ups</p>
            </div>

        </div>


        <!-- ACTION BUTTON -->

        <div class="actionSection">

            <lightning-button
                label="Create Bulk Follow-ups"
                variant="brand"
                onclick={handleBulkTaskCreation}>
            </lightning-button>

        </div>


        <!-- ANALYTICS TABLE -->

        <div class="tableContainer">

            <table class="slds-table slds-table_cell-buffer slds-table_bordered">

                <thead>
                    <tr>
                        <th>Select</th>
                        <th>Opportunity</th>
                        <th>Risk Score</th>
                        <th>Risk Level</th>
                        <th>SLA Health</th>
                        <th>Days To Close</th>
                        <th>Recommended Action</th>
                    </tr>
                </thead>

                <tbody>

                    <template for:each={records} for:item="rec">

                        <tr key={rec.oppId}>

                            <td>
                                <lightning-input
                                    type="checkbox"
                                    data-id={rec.oppId}
                                    onchange={handleSelection}>
                                </lightning-input>
                            </td>

                            <td>{rec.oppName}</td>

                            <td>
                                <lightning-progress-bar
                                    value={rec.riskScore}>
                                </lightning-progress-bar>
                            </td>

                            <td>
                                <lightning-badge
                                    label={rec.riskLevel}>
                                </lightning-badge>
                            </td>

                            <td>{rec.slaHealth}</td>

                            <td>{rec.daysToClose}</td>

                            <td>{rec.recommendedAction}</td>

                        </tr>

                    </template>

                </tbody>

            </table>

        </div>


        <!-- SMART RECOMMENDATION -->

        <div class="recommendationPanel">

            <h2>Smart Recommendations</h2>

            <ul>
                <li>Focus on high-risk opportunities first</li>
                <li>Create follow-ups for deals without tasks</li>
                <li>Monitor opportunities nearing close dates</li>
                <li>Escalate critical SLA opportunities</li>
            </ul>

        </div>

    </lightning-card>

</template>
